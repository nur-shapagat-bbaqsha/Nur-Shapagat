<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Іс шаралар | Нұр-шапағат бөбекжай балабақшасы</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
:root{
  --bg:#f7fcfb; --text:#1f3f46; --muted:#668087; --primary:#2bb7a7; --primary-dark:#168e83; --mint:#e3f8f4; --white:#fff; --shadow:0 18px 45px rgba(28,119,118,.14); --radius:28px; --container:min(1180px, calc(100% - 32px));
}
*{box-sizing:border-box} body{margin:0;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;overflow-x:hidden}
a{text-decoration:none;color:inherit} .container{width:var(--container);margin:auto}

/* Header */
.site-header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(43,183,167,0.1)}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 0}
.brand{display:flex;align-items:center;gap:12px} .logo-img{width:60px;height:60px;border-radius:15px;object-fit:cover}
.nav{display:flex;gap:10px} .nav a{font-size:12px;font-weight:800;padding:8px 12px;border-radius:20px}
.nav a.active{background:var(--mint);color:var(--primary-dark)}

/* Page Hero */
.page-hero{padding:40px 0;background:linear-gradient(135deg,#edfffb,#fef9df);text-align:center;border-bottom-left-radius:40px;border-bottom-right-radius:40px}
.page-hero h1{font-size:32px;margin:10px 0} .breadcrumbs{font-size:14px;color:var(--muted)}

/* Video Section */
.events-block{padding:40px 0} .eyebrow{display:inline-block;background:rgba(43,183,167,0.1);color:var(--primary-dark);padding:5px 15px;border-radius:20px;font-weight:800;font-size:13px;margin-bottom:15px}
.group-video-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:25px}
.group-video-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;border:1px solid rgba(43,183,167,0.1)}
.group-video-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.group-video-top h3{margin:0;font-size:20px} .group-video-count{background:var(--mint);padding:2px 10px;border-radius:10px;font-weight:800}

/* Video Player Frame */
.youtube-frame {
    width: 100%;
    aspect-ratio: 9/16;
    background: #000;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
}
.youtube-frame iframe {
    width: 100%;
    height: 100%;
    border: 0;
}
.video-caption{margin-top:12px;text-align:center;font-weight:700;color:var(--muted)}

/* Controls */
.video-controls{display:flex;align-items:center;justify-content:center;gap:15px;margin-top:15px}
.video-controls button{border:0;background:var(--mint);color:var(--primary-dark);width:40px;height:40px;border-radius:50%;font-weight:900;cursor:pointer}
.video-dots{display:flex;gap:6px} .video-dots button{width:8px;height:8px;border-radius:50%;background:#ddd;border:0;padding:0}
.video-dots button.active{background:var(--primary);width:20px;border-radius:10px}

/* Doc Cards */
.doc-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.doc-card{background:var(--white);padding:15px;border-radius:20px;display:flex;align-items:center;gap:12px;border:1px solid rgba(43,183,167,0.1)}
.doc-icon{font-size:24px} .doc-info h3{margin:0;font-size:15px}

@media (max-width:800px){ .group-video-grid, .doc-grid{grid-template-columns:1fr} .nav{display:none} }
  </style>
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="index.html">
      <img src="https://drive.google.com/thumbnail?id=1Lv8E2HRic45zU3nQd8rwrE_RZAWe8UdM&sz=w256" class="logo-img">
      <div><strong>Нұр-шапағат</strong></div>
    </a>
    <nav class="nav" id="site-nav"></nav>
  </div>
</header>

<section class="page-hero">
  <div class="container">
    <div class="breadcrumbs">Басты бет / Іс шаралар</div>
    <h1>Іс шаралар</h1>
  </div>
</section>

<main class="container" id="events-list"></main>

<script>
const MENU = [
  { title: 'ҚҰЖАТТАР', href: 'documents.html' },
  { title: 'БІЗ ТУРАЛЫ', href: 'about.html' },
  { title: 'ІС ШАРАЛАР', href: 'events.html' },
  { title: 'ШАРУАШЫЛЫҚ', href: 'business.html' }
];

const DATA = {
  events: [
    {
      section: 'Құжаттар',
      items: [
        { title: 'Облыстық семинар', link: 'https://drive.google.com/file/d/1EibOB1KFfcH_40cO1Sog2O6pDcVNo_bQ/view?usp=sharing' },
        { title: 'Ашық сабақ 2025-2026', link: 'https://drive.google.com/file/d/1F4dAKvhj7p0eS8mG61JNzCZOnlXc_au4/view?usp=sharing' }
      ]
    }
  ]
};

const VIDEOS = [
  { group: 'Айнамкөз тобы', videos: [{ title: 'Айнамкөз тобы видео', link: 'https://drive.google.com/file/d/1pmsi7wZI8vxUsMw22xItkbUeDfLIOqlc/view' }] },
  { group: 'Күншуақ тобы', videos: [{ title: 'Күншуақ тобы видео', link: 'https://drive.google.com/file/d/12bauoZ2JIrDGCODCmi6g44YwETW7jDLu/view' }] },
  { group: 'Ақжелкен тобы', videos: [{ title: '1-видео', link: 'https://drive.google.com/file/d/1NH5uGoIijiUQdy06lR9KobH1xMziCp3e/view' }, { title: '2-видео', link: 'https://drive.google.com/file/d/1PejdDTmdx299Wf43UbCQjMhjfj8unmu8/view' }] },
  { group: 'Балдәурен тобы', videos: [{ title: '1-видео', link: 'https://drive.google.com/file/d/1kR0QktpoOUJDkOtILGPu0kJ1NZ8sLy63/view' }, { title: '2-видео', link: 'https://drive.google.com/file/d/1zwnLelD-eV4KYUDW-GjW5Ku_q03vkT88/view' }] }
];

function getDriveEmbed(url) {
    const id = url.match(/\/d\/([^/]+)/);
    return id ? `https://drive.google.com/file/d/${id[1]}/preview` : url;
}

function renderPage() {
    const el = document.getElementById('events-list');
    
    // Videos
    let vHtml = `<section class="events-block"><span class="eyebrow">Бейнематериалдар</span><div class="group-video-grid">`;
    VIDEOS.forEach((item, idx) => {
        const slides = item.videos.map(v => `<div class="video-slide" style="min-width:100%"><div class="youtube-frame"><iframe src="${getDriveEmbed(v.link)}"></iframe></div><p class="video-caption">${v.title}</p></div>`).join('');
        const dots = item.videos.map((_, i) => `<button class="${i===0?'active':''}"></button>`).join('');
        
        vHtml += `
        <article class="group-video-card" id="card-${idx}">
            <div class="group-video-top"><h3>${item.group}</h3><span class="group-video-count">${item.videos.length}</span></div>
            <div style="overflow:hidden"><div class="video-track" style="display:flex; transition:0.5s">${slides}</div></div>
            ${item.videos.length > 1 ? `<div class="video-controls"><button onclick="move(${idx},-1)">‹</button><div class="video-dots">${dots}</div><button onclick="move(${idx},1)">›</button></div>` : ''}
        </article>`;
    });
    vHtml += `</div></section>`;

    // Docs
    const dHtml = DATA.events.map(g => `
        <section class="events-block"><span class="eyebrow">${g.section}</span><div class="doc-grid">
            ${g.items.map(d => `<a href="${d.link}" target="_blank" class="doc-card"><span class="doc-icon">📄</span><div class="doc-info"><h3>${d.title}</h3></div></a>`).join('')}
        </div></section>`).join('');

    el.innerHTML = vHtml + dHtml;
}

const states = VIDEOS.map(() => 0);
window.move = (cardIdx, dir) => {
    const card = document.getElementById(`card-${cardIdx}`);
    const track = card.querySelector('.video-track');
    const dots = card.querySelectorAll('.video-dots button');
    const total = VIDEOS[cardIdx].videos.length;
    
    states[cardIdx] = (states[cardIdx] + dir + total) % total;
    track.style.transform = `translateX(-${states[cardIdx] * 100}%)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === states[cardIdx]));
};

document.getElementById('site-nav').innerHTML = MENU.map(m => `<a href="${m.href}" class="${m.title==='ІС ШАРАЛАР'?'active':''}">${m.title}</a>`).join('');
renderPage();
</script>

</body>
</html>
