<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Әдіскер админ панелі | Нұр-шапағат</title>
  <style>
    body{margin:0;font-family:Arial,system-ui,sans-serif;background:#f4fbf9;color:#183f45}
    .wrap{max-width:980px;margin:0 auto;padding:32px 16px}
    .card{background:#fff;border:1px solid #d8efeb;border-radius:24px;box-shadow:0 16px 40px rgba(28,119,118,.12);padding:24px;margin:18px 0}
    input,textarea,select{width:100%;box-sizing:border-box;border:1px solid #cde4df;border-radius:14px;padding:12px;margin:6px 0 12px;font-size:15px}
    textarea{min-height:95px}button,.btn{border:0;border-radius:999px;background:#2bb7a7;color:white;font-weight:800;padding:12px 18px;cursor:pointer;text-decoration:none;display:inline-flex;margin:4px}
    .ghost{background:#eef8f6;color:#168e83}.danger{background:#e35b5b}.row{display:grid;grid-template-columns:80px 1fr 1fr auto;gap:10px;align-items:start}.hidden{display:none}.muted{color:#607980;font-size:14px}@media(max-width:760px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Әдіскер админ панелі</h1>
    <p class="muted">Бұл панель жаңалықтарды браузер ішінде өзгертеді. Қауіпсіздік үшін іздеу жүйесіне жабық.</p>
    <section id="login" class="card">
      <h2>Кіру</h2>
      <p class="muted">Құпиясөз: <b>nurshapagat2026</b>. Жария сайт үшін Firebase/Supabase сияқты база қосылса, өзгертулер барлық адамға көрінеді.</p>
      <input id="pass" type="password" placeholder="Құпиясөз">
      <button onclick="login()">Кіру</button>
    </section>
    <section id="panel" class="card hidden">
      <h2>Соңғы жаңалықтарды өзгерту</h2>
      <div id="items"></div>
      <button onclick="addItem()">+ Жаңалық қосу</button>
      <button onclick="saveNews()">Сақтау</button>
      <button class="ghost" onclick="resetNews()">Бастапқыға қайтару</button>
      <a class="btn ghost" href="index.html">Сайтқа қайту</a>
      <p id="status" class="muted"></p>
    </section>
  </div>
<script>
const DEFAULT_NEWS = [
  { title: 'Ұлттық құндылықтар апталығы', text: 'Балабақша тәрбиеленушілері қазақ халқының салт-дәстүрлерімен танысып, ұлттық ойындарға қатысты.', icon: '🌿' },
  { title: 'Ашық ұйымдастырылған іс-әрекет', text: 'Педагогтер балалардың шығармашылық және танымдық қабілеттерін дамытуға арналған ашық сабақ өткізді.', icon: '🎨' },
  { title: 'Ата-аналармен бірлескен іс-шара', text: 'Балабақшада ата-аналар қауымдастығымен бірге тәрбиелік мәні бар кездесу ұйымдастырылды.', icon: '🤝' },
  { title: 'Балалар шығармашылығы көрмесі', text: 'Тәрбиеленушілердің суреттері мен қолөнер жұмыстары ұсынылған шығармашылық көрме өтті.', icon: '✨' }
];
let news = [];
function load(){ try{news=JSON.parse(localStorage.getItem('nurshapagat_news'))||DEFAULT_NEWS}catch(e){news=[...DEFAULT_NEWS]} render(); }
function login(){ if(document.getElementById('pass').value==='nurshapagat2026'){localStorage.setItem('nurshapagat_admin','1');document.getElementById('login').classList.add('hidden');document.getElementById('panel').classList.remove('hidden');load();} else alert('Құпиясөз қате'); }
function render(){document.getElementById('items').innerHTML=news.map((n,i)=>`<div class="row card"><input value="${escapeHtml(n.icon||'')}" data-i="${i}" data-k="icon" placeholder="Иконка"><input value="${escapeHtml(n.title||'')}" data-i="${i}" data-k="title" placeholder="Тақырып"><textarea data-i="${i}" data-k="text" placeholder="Мәтін">${escapeHtml(n.text||'')}</textarea><button class="danger" onclick="delItem(${i})">Өшіру</button></div>`).join('');}
function escapeHtml(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}
function collect(){document.querySelectorAll('[data-i]').forEach(el=>{news[+el.dataset.i][el.dataset.k]=el.value}); news=news.filter(n=>n.title||n.text);}
function addItem(){collect();news.push({icon:'📰',title:'Жаңа жаңалық',text:'Мәтінді осы жерге жазыңыз.'});render();}
function delItem(i){collect();news.splice(i,1);render();}
function saveNews(){collect();localStorage.setItem('nurshapagat_news',JSON.stringify(news));document.getElementById('status').textContent='Сақталды. Басты бетті ашып тексеріңіз.';}
function resetNews(){localStorage.removeItem('nurshapagat_news');news=[...DEFAULT_NEWS];render();}
if(localStorage.getItem('nurshapagat_admin')==='1'){document.getElementById('login').classList.add('hidden');document.getElementById('panel').classList.remove('hidden');load();}
</script>
</body>
</html>
